# GoReleaser configuration for arc (arc-cli)
# Documentation: https://goreleaser.com
version: 2

before:
  hooks:
    # Ensure module dependencies are tidy
    - go mod tidy
    # Run tests before release
    - go test ./...

builds:
  - id: arc
    main: ./cmd/arc
    binary: arc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    # Custom ldflags for version info
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser

archives:
  - id: arc-archive
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^style:'
      - '^refactor:'
      - '^perf:'
      - '^ci:'
  groups:
    - title: '🚀 Features'
      regexp: '^feat'
    - title: '🐛 Bug Fixes'
      regexp: '^fix'
    - title: '🔒 Security'
      regexp: '^sec'
    - title: '⚠️ Breaking Changes'
      regexp: '^.*!:'
    - title: 'Other Changes'

release:
  github:
    owner: masa6161
    name: arc-cli
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  header: |
    ## ARC v{{.Version}}

    Adaptive Review Coordinator - run parallel code reviews with AI agents.
  footer: |
    ---

    **Full Changelog**: https://github.com/masa6161/arc-cli/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Installation

    ### Homebrew (macOS)
    ```bash
    brew install --cask masa6161/tap/arc
    ```

    ### Direct Download
    Download the appropriate archive from the assets below and extract the `arc` binary.
    Windows releases are published as `zip` archives containing `arc.exe`.

    ### From Source
    ```bash
    go install github.com/masa6161/arc-cli/cmd/arc@v{{ .Version }}
    ```

homebrew_casks:
  - name: arc
    repository:
      owner: masa6161
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/masa6161/arc-cli"
    description: "Adaptive Review Coordinator - run parallel code reviews with AI agents"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Cask update for {{ .ProjectName }} version {{ .Tag }}"
    caveats: |
      ARC has been installed! Get started with:
        arc --help
        arc --reviewers 5 --base main

      Documentation: https://github.com/masa6161/arc-cli#readme

      ARC runs parallel code reviews using AI agents and summarizes findings.
      It requires at least one supported LLM CLI: codex, claude, or gemini.

# Sign and notarize macOS binaries
notarize:
  macos:
    - enabled: '{{ isEnvSet "QUILL_SIGN_P12" }}'
      ids:
        - arc
      sign:
        certificate: "{{.Env.QUILL_SIGN_P12}}"
        password: "{{.Env.QUILL_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.QUILL_NOTARY_ISSUER}}"
        key_id: "{{.Env.QUILL_NOTARY_KEY_ID}}"
        key: "{{.Env.QUILL_NOTARY_KEY}}"
        wait: true
        timeout: 20m

# Announce releases on social media (optional)
announce:
  skip: true
